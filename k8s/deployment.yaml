apiVersion: apps/v1
kind: Deployment
metadata:
  name: aerogroupguard-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aerogroupguard-api
  template:
    metadata:
      labels:
        app: aerogroupguard-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/aerogroupguard:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: aerogroupguard-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: aerogroupguard-api
spec:
  selector:
    app: aerogroupguard-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
